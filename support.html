<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support - PickleMixRR</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: #E4E5E0;
      color: #111;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .logo {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      color: #444;
      text-align: left;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a.button {
      display: block;
      padding: 14px;
      border-radius: 12px;
      background: #111;
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    a.button.secondary {
      background: white;
      color: #111;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header-section">
      <img src="icon.png" class="logo" alt="PickleMixRR Icon" />
      <h1>Support</h1>
    </div>

    <p>This app is available at the Apple Store by unlisted distribution for a specific small group use and is intentionally without expansive features.</p>
    <p>For support, contact the developer.</p>

    <div class="buttons">
      <a class="button secondary" href="index.html">
        Back
      </a>
    </div>

    <footer>
      © 2026 PickleMixRR
    </footer>

  </div>
</body>
</html>
